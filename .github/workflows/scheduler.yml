name: Share4Life Auto Scheduler

on:
  schedule:
    - cron: "*/5 * * * *"   # Every 5 minutes
    - cron: "0 * * * *"     # Every hour
    - cron: "0 2 * * *"     # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  run-tasks:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_SSL_REQUIRE: ${{ secrets.DB_SSL_REQUIRE }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
      EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
      DEFAULT_FROM_EMAIL: ${{ secrets.DEFAULT_FROM_EMAIL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipenv
        run: |
          python -m pip install --upgrade pip
          pip install pipenv

      - name: Install dependencies
        run: |
          pipenv install --deploy --ignore-pipfile

      # 5-MINUTE TASKS
      - name: Run 5-minute tasks
        if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
        run: |
          pipenv run python manage.py escalate_blood_requests
          pipenv run python manage.py process_blood_email_escalations
          pipenv run python manage.py send_queued_emails

      # HOURLY TASKS
      - name: Run hourly tasks
        if: github.event.schedule == '0 * * * *'
        run: |
          pipenv run python manage.py send_donor_eligibility_reminders
          pipenv run python manage.py remind_disbursement_proofs
          pipenv run python manage.py update_campaign_states
          pipenv run python manage.py update_campaign_statuses

      # DAILY TASK
      - name: Run daily tasks
        if: github.event.schedule == '0 2 * * *'
        run: |
          pipenv run python manage.py recalculate_points
